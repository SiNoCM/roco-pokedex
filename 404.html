<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>《洛克王国·世界》精灵图鉴 - 页面跳转中...</title>
    <!--
      GitHub Pages SPA 重定向脚本
      当用户直接访问子路径时，404.html 会被 GitHub Pages 返回。
      此脚本保存目标路径到 sessionStorage，然后重定向到首页，
      index.html 中的脚本会恢复路径。
    -->
    <script>
      (function () {
        var basePath = '/roco-pokedex/';
        // 将当前路径保存到 sessionStorage
        var redirectPath = window.location.pathname;
        if (redirectPath !== basePath) {
          try {
            sessionStorage.setItem('roco_redirect', redirectPath + window.location.search + window.location.hash);
          } catch (e) {}
        }
        // 重定向到首页
        window.location.replace(basePath);
      })();
    </script>
  </head>
  <body>
    <p style="text-align:center;font-family:sans-serif;padding-top:40px;">页面跳转中，请稍候...</p>
    <noscript>
      <p style="text-align:center;font-family:sans-serif;padding-top:40px;">
        请 <a href="/roco-pokedex/">点击这里</a> 访问精灵图鉴。
      </p>
    </noscript>
  </body>
</html>
