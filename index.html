    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#F9FAFB" />

    <meta name="keywords" content="洛克王国,洛克王国世界,精灵图鉴,宠物图鉴,种族值" />

    <!-- Preload critical CSS -->
    <link rel="preload" href="./assets/index-BMwEmXte.css" as="style" crossorigin>
    <link rel="stylesheet" crossorigin href="./assets/index-BMwEmXte.css">

    <!-- Skeleton loading screen - shown immediately while JS loads -->
    <style>
      #app-loading{position:fixed;inset:0;background:#F9FAFB;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
      #app-loading.hide{opacity:0;pointer-events:none}
      .sk{background:linear-gradient(90deg,#E5E7EB 25%,#F3F4F6 50%,#E5E7EB 75%);background-size:200% 100%;animation:sk 1.5s infinite}
      @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
      .sk-title{width:200px;height:28px;border-radius:8px;margin-bottom:24px}
      .sk-search{width:280px;height:40px;border-radius:20px;margin-bottom:20px}
      .sk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:400px}
      .sk-card{aspect-ratio:1;border-radius:12px}
      @media(min-width:640px){.sk-grid{grid-template-columns:repeat(4,1fr);max-width:500px}}
    </style>

    <!-- Inline SPA redirect recovery -->
    <script>
      try{var r=sessionStorage.getItem('roco_redirect');if(r){sessionStorage.removeItem('roco_redirect');history.replaceState(null,'',r)}}catch(e){}
    </script>
  </head>
  <body>
    <div id="app-loading">
      <div class="sk sk-title"></div>
      <div class="sk sk-search"></div>
      <div class="sk-grid">
        <div class="sk sk-card"></div><div class="sk sk-card"></div><div class="sk sk-card"></div>
        <div class="sk sk-card"></div><div class="sk sk-card"></div><div class="sk sk-card"></div>
      </div>
    </div>
    <div id="root"></div>

    <!-- Main React app - load with fetchpriority high for fastest parse -->
    <script type="module" crossorigin fetchpriority="high" src="./assets/index-CX5B3Qh1.js"></script>

    <!-- Hide skeleton after app renders, with safety fallback -->
    <script>
      function hideSkeleton(){var el=document.getElementById('app-loading');if(el){el.classList.add('hide');setTimeout(function(){el.remove()},300)}}
      window.addEventListener('load',function(){setTimeout(hideSkeleton,200)});
      setTimeout(hideSkeleton,15000);
      // Service Worker for offline caching
      window.addEventListener('load',function(){if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){})}});
    </script>
  </body>
</html>
