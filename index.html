    <!-- 预连接关键域名 -->
    <link rel="preconnect" href="https://sinocm.github.io" crossorigin>

    <!-- 预加载关键CSS（不预加载JS以避免阻塞首屏） -->
    <link rel="preload" href="./assets/index-BMwEmXte.css" as="style" crossorigin>

    <style>
      /* iOS Safe Area Support */
      .h-safe-area-inset-bottom {
        height: env(safe-area-inset-bottom, 0px);
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      /* Hide scrollbar for IE, Edge and Firefox */
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Animation utilities */
      @keyframes slide-in-from-top {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-in {
        animation-duration: 0.2s;
        animation-fill-mode: both;
      }

      .slide-in-from-top-2 {
        animation-name: slide-in-from-top;
      }

      /* 加载骨架屏 */
      #loading-skeleton {
        position: fixed;
        inset: 0;
        background: #F9FAFB;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #loading-skeleton.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .skeleton-title {
        width: 200px;
        height: 28px;
        background: linear-gradient(90deg, #E5E7EB 25%, #F3F4F6 50%, #E5E7EB 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
        margin-bottom: 24px;
      }

      .skeleton-search {
        width: 280px;
        height: 40px;
        background: linear-gradient(90deg, #E5E7EB 25%, #F3F4F6 50%, #E5E7EB 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 20px;
        margin-bottom: 16px;
      }

      .skeleton-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 0 16px;
        width: 100%;
        max-width: 400px;
      }

      .skeleton-card {
        aspect-ratio: 1;
        background: linear-gradient(90deg, #E5E7EB 25%, #F3F4F6 50%, #E5E7EB 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 12px;
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      @media (min-width: 640px) {
        .skeleton-grid {
          grid-template-columns: repeat(4, 1fr);
          max-width: 500px;
        }
      }
    </style>

    <link rel="stylesheet" crossorigin href="./assets/index-BMwEmXte.css">
  </head>
  <body>
    <!--
      GitHub Pages SPA 重定向恢复脚本
      从 sessionStorage 读取 404.html 保存的路径并恢复
    -->
    <script>
      (function () {
        var redirect = null;
        try {
          redirect = sessionStorage.getItem('roco_redirect');
        } catch (e) {}
        if (redirect) {
          try {
            sessionStorage.removeItem('roco_redirect');
          } catch (e) {}
          // 使用 replaceState 恢复路径，不触发页面重新加载
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
    <!-- 加载骨架屏 -->
    <div id="loading-skeleton">
      <div class="skeleton-title"></div>
      <div class="skeleton-search"></div>
      <div class="skeleton-grid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // 隐藏骨架屏
      window.addEventListener('load', function() {
        setTimeout(function() {
          var skeleton = document.getElementById('loading-skeleton');
          if (skeleton) {
            skeleton.classList.add('hidden');
            setTimeout(function() { skeleton.remove(); }, 300);
          }
        }, 100);
      });
    </script>
    <script type="module" crossorigin src="./assets/index-CX5B3Qh1.js"></script>
    <script>
      // Register Service Worker for caching
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js')
            .then(function(reg) { console.log('SW registered'); })
            .catch(function(err) { console.log('SW registration failed:', err); });
        });
      }
    </script>
  </body>
</html>
