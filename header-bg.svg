<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 200" preserveAspectRatio="none">
  <defs>
    <!-- S3 铅字幻梦 主背景：深夜蓝紫星空 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="25%" stop-color="#1E1B4B"/>
      <stop offset="55%" stop-color="#312E81"/>
      <stop offset="80%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0C1445"/>
    </linearGradient>
    <!-- 星云光晕 -->
    <radialGradient id="nebula1" cx="15%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#A855F7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#9333EA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <!-- 书页纹理 -->
    <pattern id="pages" x="0" y="0" width="80" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(-2)">
      <line x1="0" y1="0" x2="80" y2="0" stroke="#C084FC" stroke-opacity="0.04" stroke-width="0.4"/>
      <line x1="0" y1="20" x2="80" y2="20" stroke="#818CF8" stroke-opacity="0.03" stroke-width="0.3"/>
      <line x1="0" y1="40" x2="80" y2="40" stroke="#C084FC" stroke-opacity="0.04" stroke-width="0.4"/>
    </pattern>
    <!-- 星光闪烁 -->
    <filter id="star-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="1280" height="200" fill="url(#bg)"/>
  <!-- 星云 -->
  <rect width="1280" height="200" fill="url(#nebula1)"/>
  <rect width="1280" height="200" fill="url(#nebula2)"/>
  <rect width="1280" height="200" fill="url(#nebula3)"/>
  <!-- 书页纹理 -->
  <rect width="1280" height="200" fill="url(#pages)"/>
  <!-- 星星 -->
  <g filter="url(#star-glow)">
    <circle cx="80" cy="25" r="1.8" fill="#E0E7FF" opacity="0.7"/>
    <circle cx="200" cy="65" r="1" fill="#C7D2FE" opacity="0.5"/>
    <circle cx="310" cy="18" r="1.4" fill="#E0E7FF" opacity="0.6"/>
    <circle cx="430" cy="90" r="0.8" fill="#C7D2FE" opacity="0.4"/>
    <circle cx="540" cy="35" r="1.6" fill="#E0E7FF" opacity="0.65"/>
    <circle cx="650" cy="110" r="1" fill="#DDD6FE" opacity="0.5"/>
    <circle cx="760" cy="22" r="1.3" fill="#E0E7FF" opacity="0.55"/>
    <circle cx="870" cy="75" r="1.8" fill="#C7D2FE" opacity="0.6"/>
    <circle cx="960" cy="40" r="0.9" fill="#E0E7FF" opacity="0.45"/>
    <circle cx="1060" cy="95" r="1.5" fill="#DDD6FE" opacity="0.55"/>
    <circle cx="1150" cy="20" r="1.2" fill="#E0E7FF" opacity="0.6"/>
    <circle cx="1220" cy="60" r="1" fill="#C7D2FE" opacity="0.5"/>
    <circle cx="160" cy="130" r="0.7" fill="#DDD6FE" opacity="0.35"/>
    <circle cx="380" cy="145" r="1.1" fill="#E0E7FF" opacity="0.4"/>
    <circle cx="590" cy="155" r="0.8" fill="#C7D2FE" opacity="0.35"/>
    <circle cx="820" cy="140" r="1.3" fill="#DDD6FE" opacity="0.4"/>
    <circle cx="1020" cy="150" r="0.9" fill="#E0E7FF" opacity="0.35"/>
  </g>
  <!-- 飘落书页装饰 -->
  <g opacity="0.06" fill="#C084FC">
    <rect x="120" y="60" width="18" height="24" rx="1" transform="rotate(-15 129 72)"/>
    <rect x="480" y="100" width="14" height="20" rx="1" transform="rotate(10 487 110)"/>
    <rect x="900" y="45" width="16" height="22" rx="1" transform="rotate(-8 908 56)"/>
    <rect x="1100" y="120" width="12" height="18" rx="1" transform="rotate(20 1106 129)"/>
  </g>
  <!-- 底部渐变遮罩（与白色内容区过渡） -->
  <defs>
    <linearGradient id="fade" x1="0%" y1="70%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0C1445" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F9FAFB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect y="140" width="1280" height="60" fill="url(#fade)"/>
</svg>
